<!DOCTYPE html>
<html>
<head>
    <title>Reset Password | OrganFlow</title>
</head>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#f4f6f9;">

<div style="background:white;padding:40px;width:400px;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,0.1);">
    <h2 style="margin-bottom:20px;">Reset Password</h2>

    <form method="POST">
        <div style="margin-bottom:15px;">
            <label>Email</label>
            <input type="email" name="email" required
                   style="width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;">
        </div>

        <div style="margin-bottom:20px;">
            <label>New Password</label>
            <input type="password" name="new_password" required
                   style="width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;">
        </div>

        <button type="submit"
                style="width:100%;padding:12px;background:#2c3e50;color:white;border:none;border-radius:5px;">
            Update Password
        </button>
    </form>
</div>

</body>
</html>
